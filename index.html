<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS Business Development Management Platform V1.40 - Embedded Data</title>
  <!-- GitHub upload build: V1.38, latest completed-project KPI/list/timeline update -->
  <style>
    :root{
      --bg:#eef3f8;
      --panel:#ffffff;
      --panel-2:#f8fafc;
      --text:#14213d;
      --muted:#64748b;
      --line:#dbe3ec;
      --primary:#0f766e;
      --primary-2:#115e59;
      --accent:#2563eb;
      --danger:#ef4444;
      --warning:#f59e0b;
      --success:#10b981;
      --purple:#8b5cf6;
      --cyan:#06b6d4;
      --pink:#ec4899;
      --orange:#f97316;
      --shadow:0 16px 40px rgba(15,23,42,.10);
      --radius:18px;
      --sidebar:290px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,#e6fffb 0%,#eef4ff 38%,#f7f5ff 72%,#fff7ed 100%);
      min-height:100vh;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{display:flex;min-height:100vh}
    .sidebar{
      width:var(--sidebar);
      background:#0f172a;
      color:white;
      padding:18px 16px 22px;
      position:fixed;
      inset:0 auto 0 0;
      overflow:auto;
      box-shadow:10px 0 35px rgba(2,6,23,.22);
      z-index:10;
      transition:width .22s ease, padding .22s ease, transform .2s ease;
    }
    .brand-wrap{
      position:relative;
      border-bottom:1px solid rgba(255,255,255,.12);
      margin-bottom:16px;
      padding:4px 4px 16px;
    }
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
      padding:8px 38px 6px 10px;
    }
    .brand-text{min-width:0}
    .logo{
      width:108px;
      height:48px;
      border-radius:0;
      background:transparent;
      display:grid;
      place-items:center;
      overflow:visible;
      flex:0 0 108px;
      box-shadow:none;
      padding:0;
    }
    .logo img{width:108px;height:48px;object-fit:contain;display:block;max-width:100%;max-height:100%}
    .brand h1{font-size:16px;line-height:1.25;margin:0}
    .brand p{font-size:12px;color:#94a3b8;margin:3px 0 0}
    .sidebar-toggle{
      position:absolute;top:10px;right:4px;
      width:32px;height:32px;border-radius:10px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);color:#e2e8f0;font-weight:900;
      display:grid;place-items:center;cursor:pointer;
    }
    .sidebar-toggle:hover{background:rgba(255,255,255,.16)}
    .nav{display:grid;gap:6px}
    .nav button{
      width:100%;
      border:0;
      background:transparent;
      color:#dbeafe;
      text-align:left;
      padding:12px 12px;
      border-radius:13px;
      display:flex;
      gap:10px;
      align-items:center;
      transition:.15s ease;
    }
    .nav button:hover{background:rgba(255,255,255,.08)}
    .nav button.active{
      background:linear-gradient(135deg,#0f766e,#1d4ed8);
      color:white;
      box-shadow:0 10px 24px rgba(37,99,235,.22);
    }
    .nav .icon{width:22px;text-align:center;flex:0 0 22px}
    .nav .label{min-width:0}
    .nav-group-label{
      margin:10px 10px 2px;
      color:#93a4b8;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.12em;
    }
    .nav-group-toggle{
      width:calc(100% - 20px);
      margin:10px 10px 2px;
      padding:6px 8px;
      border:0;
      background:rgba(255,255,255,.05);
      color:#b7c6d8;
      border-radius:10px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.10em;
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
    }
    .nav-group-toggle:hover{background:rgba(255,255,255,.09);color:#fff}
    .nav-group-toggle .chev{font-size:12px;letter-spacing:0}
    .nav button.nav-sub{padding-left:28px;margin-left:8px;width:calc(100% - 8px);border-left:2px solid rgba(255,255,255,.13);border-radius:10px}
    .nav button.nav-sub .icon{width:18px;flex-basis:18px}
    .app.sidebar-collapsed .nav-group-label,.app.sidebar-collapsed .nav-group-toggle{display:none}
    .app.sidebar-collapsed .nav button.nav-sub{padding-left:10px;margin-left:0;width:100%;border-left:0}
    .sidebar-footer{
      margin-top:18px;
      padding:14px 12px;
      color:#cbd5e1;
      background:rgba(255,255,255,.06);
      border-radius:16px;
      font-size:12px;
      line-height:1.45;
    }
    .app.sidebar-collapsed .sidebar{width:88px;padding-left:10px;padding-right:10px}
    .app.sidebar-collapsed .main{margin-left:88px;width:calc(100% - 88px)}
    .app.sidebar-collapsed .brand{justify-content:center;padding-right:0;padding-left:0}
    .app.sidebar-collapsed .brand-text,
    .app.sidebar-collapsed .sidebar-footer,
    .app.sidebar-collapsed .nav .label{display:none}
    .app.sidebar-collapsed .sidebar-toggle{right:50%;transform:translateX(50%)}
    .app.sidebar-collapsed .nav button{justify-content:center;padding-left:10px;padding-right:10px}
    .app.sidebar-collapsed .logo{width:66px;height:29px;flex-basis:66px}
    .app.sidebar-collapsed .logo img{width:66px;height:29px}
    .main{
      margin-left:var(--sidebar);
      width:calc(100% - var(--sidebar));
      min-height:100vh;
      padding:22px;
      transition:margin-left .22s ease, width .22s ease;
    }
    .topbar{
      background:rgba(255,255,255,.86);
      border:1px solid rgba(219,227,236,.86);
      backdrop-filter: blur(16px);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      position:sticky;
      top:16px;
      z-index:8;
    }
    .title h2{margin:0;font-size:24px;letter-spacing:-.03em}
    .title p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill, .btn, .btn-light, .btn-danger, .btn-warning, .btn-success{
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 12px;
      background:white;
      color:var(--text);
      min-height:38px;
    }
    .btn{
      border-color:transparent;
      background:linear-gradient(135deg,var(--primary),#2563eb 55%,#7c3aed);
      color:white;
      font-weight:700;
      box-shadow:0 9px 20px rgba(15,118,110,.18);
    }
    .btn-light{background:#f8fafc;font-weight:700}
    .btn-danger{background:#fee2e2;color:#991b1b;border-color:#fecaca;font-weight:700}
    .btn-warning{background:#fffbeb;color:#92400e;border-color:#fed7aa;font-weight:700}
    .btn-success{background:#dcfce7;color:#166534;border-color:#bbf7d0;font-weight:700}
    .btn.small,.btn-light.small,.btn-danger.small,.btn-warning.small,.btn-success.small{padding:6px 9px;min-height:30px;border-radius:10px;font-size:12px}
    .project-name-fill{
      width:100%;
      min-width:252px;
      max-width:100%;
      display:block;
      text-align:left;
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:11px;
      padding:8px 10px;
      min-height:34px;
      background:linear-gradient(90deg, rgba(34,197,94,.30) 0 var(--confidence), #f8fafc var(--confidence) 100%);
      color:#0f172a;
      font-weight:700;
      white-space:nowrap;
      text-overflow:ellipsis;
      box-shadow:none;
    }
    .project-name-fill:hover{border-color:#93c5fd;background:linear-gradient(90deg, rgba(34,197,94,.38) 0 var(--confidence), #eff6ff var(--confidence) 100%)}
    .project-name-fill span{position:relative;z-index:1}
    td.project-name-cell{text-align:left;min-width:270px}
    th.action-head, td.action-cell{width:76px;text-align:center;white-space:nowrap}
    .project-name-head{min-width:270px}
    .project-name-head-inner{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .project-pipeline-table th.col-stage,.project-pipeline-table td.col-stage{width:110px;min-width:110px;max-width:130px}
    .project-pipeline-table td.col-stage .tag{max-width:100%;white-space:normal;line-height:1.2;justify-content:center;text-align:center}
    .project-country-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0 0 12px;padding:10px 12px;border:1px solid var(--line);border-radius:14px;background:#f8fafc}
    .project-country-label{font-weight:900;color:#334155;margin-right:2px}
    .project-country-btn{border:1px solid #dbe3ec;background:#fff;color:#475569;border-radius:999px;padding:6px 10px;font-weight:800;font-size:12px;display:inline-flex;align-items:center;gap:6px}
    .project-country-btn:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
    .project-country-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;box-shadow:0 6px 14px rgba(37,99,235,.18)}
    .project-country-count{opacity:.72;font-weight:900}
    .sort-confidence{
      width:24px;height:24px;min-height:24px;padding:0;border-radius:8px;
      display:inline-grid;place-items:center;font-size:12px;line-height:1;
      color:#64748b;background:#f8fafc;border:1px solid #dbe3ec;box-shadow:none;
    }
    .sort-confidence.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
    .icon-action{
      width:28px;height:28px;min-height:28px;padding:0;border-radius:9px;
      display:inline-grid;place-items:center;margin:0 2px;font-size:14px;font-weight:900;
    }
    .completed-filter-bar{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin:12px 0 16px;padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--panel-2)}
    .completed-filter-bar label{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:800}
    .completed-filter-bar select,.completed-filter-bar input{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:9px 10px;color:var(--text)}
    .completed-timeline-card{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:16px;overflow:hidden}
    .completed-timeline-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    .completed-timeline-head h3{margin:0 0 3px}
    .completed-timeline-head p{margin:0;color:var(--muted);font-size:13px}
    .completed-timeline-wrap{overflow-x:auto;overflow-y:hidden;padding:24px 4px 34px;scrollbar-width:thin}
    .completed-timeline{position:relative;display:flex;gap:38px;align-items:center;min-width:max-content;padding:338px 34px 351px}
    .completed-timeline:before{content:'';position:absolute;left:24px;right:24px;top:50%;height:5px;background:linear-gradient(90deg,#10b981,#06b6d4,#8b5cf6,#f59e0b,#22c55e);border-radius:999px;opacity:.8}
    .completed-node{position:relative;width:250px;min-width:250px;height:0}
    .completed-dot{position:absolute;left:50%;top:50%;width:18px;height:18px;border-radius:999px;background:#10b981;border:4px solid var(--panel);box-shadow:0 0 0 4px rgba(16,185,129,.16);transform:translate(-50%,-50%);z-index:2}
    .completed-node:after{content:'';position:absolute;left:50%;width:2px;height:42px;background:#cbd5e1;transform:translateX(-50%)}
    .completed-node.top:after{bottom:8px}
    .completed-node.bottom:after{top:8px}
    .completed-project-card{position:absolute;left:50%;transform:translateX(-50%);width:250px;border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:0 10px 24px rgba(15,23,42,.08);padding:13px;display:grid;gap:8px;max-height:none}
    .completed-node.top .completed-project-card{bottom:50px}
    .completed-node.bottom .completed-project-card{top:50px}
    .completed-project-card h4{margin:0;font-size:14px;line-height:1.25;color:#0f2a4d}
    .completed-project-sub{color:var(--muted);font-size:12px;line-height:1.35}
    .completed-chip-row{display:flex;gap:6px;flex-wrap:wrap}
    .completed-chip{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
    .completed-chip.green{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
    .completed-chip.orange{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
    .completed-cod{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:8px;font-size:12px;color:var(--muted)}
    .completed-cod b{color:#059669}
    .completed-mini{display:flex;gap:10px;flex-wrap:wrap;color:#475569;font-size:12px}
    .completed-mini span{display:inline-flex;align-items:center;gap:4px}
    .completed-success{position:absolute;right:9px;top:9px;width:18px;height:18px;border-radius:999px;background:#16a34a;color:white;font-size:12px;display:grid;place-items:center}
    .completed-note{margin-top:12px;background:#ecfdf5;border:1px solid #bbf7d0;color:#166534;border-radius:12px;padding:10px 12px;font-size:13px}
    .completed-timeline-card.fullscreen-mode{height:100%;display:flex;flex-direction:column;overflow:hidden}
    .completed-timeline-card.fullscreen-mode .completed-timeline-head{flex:0 0 auto}
    .completed-timeline-card.fullscreen-mode .completed-timeline-wrap{flex:1;min-height:0;overflow-x:auto;overflow-y:hidden;padding:10px 6px 24px}
    .completed-timeline-card.fullscreen-mode .completed-timeline{height:100%;min-height:936px;padding-top:390px;padding-bottom:403px}
    .modal.completed-fullscreen-modal{align-items:stretch;justify-content:stretch;padding:12px}
    .modal.completed-fullscreen-modal .modal-box{width:100%;max-width:none;height:calc(100vh - 24px);max-height:none;border-radius:20px;display:flex;flex-direction:column;overflow:hidden}
    .modal.completed-fullscreen-modal #recordForm{flex:1;min-height:0;display:flex;flex-direction:column}
    .modal.completed-fullscreen-modal .modal-head{flex:0 0 auto}
    .completed-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .view-toggle{display:inline-flex;gap:4px;background:#f1f5f9;border:1px solid var(--line);border-radius:12px;padding:3px}
    .view-toggle button{border:0;background:transparent;border-radius:9px;padding:6px 10px;font-size:12px;font-weight:800;color:#64748b}
    .view-toggle button.active{background:var(--primary);color:#fff}
    .completed-card-actions{display:flex;gap:6px;align-items:center;justify-content:flex-end}
    .completed-table .completed-name-btn{border:0;background:transparent;color:#0f3b72;font-weight:900;text-align:left;padding:0;cursor:pointer}
    .completed-table .completed-name-btn:hover{text-decoration:underline}
    .completed-contract-value{font-weight:900;color:#0f766e;background:#ecfdf5;border:1px solid #bbf7d0;border-radius:999px;padding:5px 10px;display:inline-flex;align-items:center;white-space:nowrap}
    body.theme-dark .completed-contract-value{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.35);color:#86efac}
    .completed-project-card{cursor:pointer}
    .completed-project-card .completed-card-actions{margin-top:2px;border-top:1px solid var(--line);padding-top:8px}
    .multi-check-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .multi-check-grid .check-item{margin:0}
    .content{margin-top:18px}
    .grid{display:grid;gap:16px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid.cols-5{grid-template-columns:repeat(5,minmax(0,1fr))}
    .card{
      background:rgba(255,255,255,.92);
      border:1px solid rgba(219,227,236,.92);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }
    .card h3{margin:0 0 12px;font-size:17px}
    .card-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .card-title h3{margin:0}
    .metric{
      padding:18px;
      border-radius:18px;
      background:linear-gradient(135deg,#ffffff,#f1f5f9);
      border:1px solid var(--line);
      min-height:130px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .metric .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}
    .metric .value{font-size:28px;font-weight:900;letter-spacing:-.04em;margin-top:10px}
    .metric .sub{color:var(--muted);font-size:12px;margin-top:8px}
    .metric.accent{background:linear-gradient(135deg,#ecfeff,#eff6ff)}
    .metric.warn{background:linear-gradient(135deg,#fff7ed,#fffbeb)}
    .metric.good{background:linear-gradient(135deg,#ecfdf5,#f0fdf4)}
    .metric.purple{background:linear-gradient(135deg,#f5f3ff,#faf5ff)}
    .filters{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    input, select, textarea{
      border:1px solid var(--line);
      background:white;
      border-radius:12px;
      padding:9px 11px;
      color:var(--text);
      outline:none;
    }
    textarea{min-height:96px;width:100%;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(96,165,250,.16)}
    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      font-size:13px;
      overflow:hidden;
    }
    th{
      text-align:left;
      color:#334155;
      background:#f1f5f9;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      padding:10px;
      position:sticky;
      top:0;
      z-index:1;
      white-space:nowrap;
    }
    th:first-child{border-left:1px solid var(--line);border-top-left-radius:12px}
    th:last-child{border-right:1px solid var(--line);border-top-right-radius:12px}
    td{
      padding:10px;
      border-bottom:1px solid #e8eef5;
      vertical-align:top;
    }
    tr:hover td{background:#f8fafc}
    .table-wrap{overflow:auto;max-height:58vh;border-radius:14px}
    .tag{
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      font-weight:800;
      background:#e2e8f0;
      color:#334155;
      white-space:nowrap;
    }
    .tag.green{background:#dcfce7;color:#166534}
    .tag.blue{background:#dbeafe;color:#1e40af}
    .tag.red{background:#fee2e2;color:#991b1b}
    .tag.orange{background:#ffedd5;color:#9a3412}
    .tag.purple{background:#ede9fe;color:#5b21b6}
    .tag.gray{background:#f1f5f9;color:#475569}
    .bar-row{display:grid;grid-template-columns:135px 1fr 90px;gap:10px;align-items:center;margin:11px 0}
    .bar-bg{height:12px;background:#e2e8f0;border-radius:999px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,#0f766e,#2563eb,#8b5cf6);border-radius:999px;min-width:3px}
    .calendar-head{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px
    }
    .calendar-layout{display:grid;grid-template-columns:minmax(0,1.82fr) minmax(312px,.78fr);gap:16px;align-items:stretch}
    .calendar-card,.todo-panel{height:680px;display:flex;flex-direction:column;min-height:0}
    .calendar-scroll{overflow:hidden;padding-bottom:2px;flex:1;min-height:0}
    .calendar-grid{
      display:grid;
      grid-template-columns:repeat(7,minmax(0,1fr));
      gap:8px;
      min-width:0;
      height:100%;
    }
    .day-name{font-weight:900;color:var(--muted);font-size:11px;text-transform:uppercase;padding:6px 8px;align-self:center}
    .day{
      min-height:0;
      height:100%;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px;
      overflow:hidden;
      cursor:pointer;
      transition:.12s ease;
      display:flex;
      flex-direction:column;
    }
    .day:hover{border-color:#93c5fd;box-shadow:0 8px 18px rgba(37,99,235,.10)}
    .day.current-month{background:#fbfdff}
    .day.muted{opacity:.42;background:#f8fafc}
    .day.today{background:#fef08a;outline:3px solid rgba(234,179,8,.42);border-color:#eab308;box-shadow:0 0 0 2px rgba(250,204,21,.20) inset}
    .day.selected{outline:3px solid rgba(37,99,235,.22);border-color:#2563eb;background:#eff6ff}
    .day.today.selected{background:#fef08a;border-color:#eab308;outline:3px solid rgba(234,179,8,.46)}
    .date-num{font-weight:900;margin-bottom:5px;font-size:13px}
    .cal-item{
      font-size:9px;
      background:#eff6ff;
      color:#1e3a8a;
      border-left:3px solid #2563eb;
      padding:3px 5px;
      border-radius:7px;
      margin:3px 0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    body.theme-dark .metric.accent{background:linear-gradient(135deg,rgba(6,182,212,.16),rgba(37,99,235,.14))}
    body.theme-dark .metric.warn{background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(249,115,22,.12))}
    body.theme-dark .metric.good{background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(6,182,212,.10))}
    body.theme-dark .metric.purple{background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(236,72,153,.10))}
    body.theme-dark th{background:#1e293b;color:#cbd5e1;border-color:#334155}
    body.theme-dark td{border-bottom-color:#243244}
    body.theme-dark tr:hover td{background:#111f33}
    body.theme-dark .table-wrap{border-color:#334155}
    body.theme-dark .tag{background:#263449;color:#cbd5e1}
    body.theme-dark .tag.green{background:rgba(16,185,129,.20);color:#86efac}
    body.theme-dark .tag.blue{background:rgba(37,99,235,.25);color:#93c5fd}
    body.theme-dark .tag.red{background:rgba(239,68,68,.20);color:#fca5a5}
    body.theme-dark .tag.orange{background:rgba(249,115,22,.22);color:#fdba74}
    body.theme-dark .tag.purple{background:rgba(139,92,246,.24);color:#c4b5fd}
    body.theme-dark .tag.gray{background:#1e293b;color:#cbd5e1}
    body.theme-dark .day, body.theme-dark .annual-item, body.theme-dark .date-detail-item, body.theme-dark .palette-swatch{background:#0f172a;border-color:#334155;color:#e5e7eb}
    body.theme-dark .day.in-month{background:#111827}
    body.theme-dark .day.muted{background:#0b1020;opacity:.55}
    body.theme-dark .day.today{background:linear-gradient(135deg,rgba(250,204,21,.34),rgba(245,158,11,.20));border-color:#facc15;outline-color:rgba(250,204,21,.35)}
    body.theme-dark .annual-month, body.theme-dark .calendar-date-detail, body.theme-dark .empty, body.theme-dark .check-item{background:#0f172a;border-color:#334155;color:#cbd5e1}
    body.theme-dark .annual-month:hover{background:#172033;border-color:#38bdf8}
    body.theme-dark .annual-item b, body.theme-dark .date-detail-item b, body.theme-dark .kv b{color:#e5e7eb}
    body.theme-dark .annual-item span, body.theme-dark .date-detail-item span{color:#94a3b8}
    body.theme-dark .project-name-fill{background:linear-gradient(90deg, rgba(16,185,129,.35) 0 var(--confidence), #0f172a var(--confidence) 100%);border-color:#334155;color:#e5e7eb}
    body.theme-dark .project-name-fill:hover{background:linear-gradient(90deg, rgba(16,185,129,.42) 0 var(--confidence), #172033 var(--confidence) 100%);border-color:#38bdf8}
    body.theme-dark .sort-confidence{background:#1e293b;border-color:#334155;color:#94a3b8}
    body.theme-dark .sort-confidence.active{background:rgba(37,99,235,.24);border-color:#60a5fa;color:#bfdbfe}
    body.theme-dark .modal-box{background:#111827;color:#e5e7eb;border:1px solid #334155}
    body.theme-dark .modal-head{border-bottom-color:#334155}
    body.theme-dark .report-box{background:#020617;border:1px solid #334155}
    body.theme-dark .setting-box label, body.theme-dark .form-field label{color:#cbd5e1}
    body.theme-dark .preview-tile{background:linear-gradient(135deg,#111827,#1e293b);border-color:#334155}

    .mobile-menu{display:none}
        @media(max-width:1000px){.completed-filter-bar{grid-template-columns:repeat(2,minmax(0,1fr))}.completed-timeline{padding-left:24px;padding-right:24px}}
    @media(max-width:680px){.completed-filter-bar{grid-template-columns:1fr}.completed-project-card{width:220px}.completed-node{width:220px;min-width:220px}.completed-timeline{gap:26px}}
@media (max-width:1280px){
      .calendar-layout{grid-template-columns:1fr}
      .calendar-card,.todo-panel{height:auto;max-height:none}
      .task-board{max-height:520px}
    }
    @media (max-width:1100px){
      :root{--sidebar:0px}
      .sidebar{transform:translateX(-100%);transition:.2s ease;width:292px}
      .sidebar.show{transform:translateX(0)}
      .app.sidebar-collapsed .sidebar{width:292px;padding-left:16px;padding-right:16px}
      .app.sidebar-collapsed .main{margin-left:0;width:100%}
      .app.sidebar-collapsed .logo{width:108px;height:48px;flex-basis:108px}
      .app.sidebar-collapsed .logo img{width:108px;height:48px}
      .main{margin-left:0;width:100%;padding:14px}
      .mobile-menu{display:inline-flex}
      .grid.cols-4,.grid.cols-5{grid-template-columns:repeat(2,minmax(0,1fr))}
      .annual-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid.cols-3{grid-template-columns:repeat(2,minmax(0,1fr))}
      .split{grid-template-columns:1fr}
      .detail-panel{position:static;max-height:none}
      .calendar-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .day-name{display:none}
      .form-grid{grid-template-columns:1fr}
      .form-field.span2{grid-column:1}
      .settings-grid{grid-template-columns:1fr}
      .palette-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .theme-preview{grid-template-columns:1fr}
    }
    @media (max-width:680px){
      .topbar{align-items:flex-start;flex-direction:column}
      .grid.cols-2,.grid.cols-3,.grid.cols-4,.grid.cols-5{grid-template-columns:1fr}
      .calendar-grid{grid-template-columns:1fr}
      .controls{justify-content:flex-start}
      .bar-row{grid-template-columns:1fr}
      .annual-grid{grid-template-columns:1fr}
    }
    @media print{
      .sidebar,.topbar .controls,.btn,.btn-light,.btn-danger,.btn-warning,.btn-success,.filters,.mobile-menu{display:none!important}
      .main{margin:0;width:100%;padding:0}
      .topbar,.card{box-shadow:none;border:1px solid #ddd}
      body{background:white}
    }
  
    body.dark .project-country-row{background:#111827;border-color:#334155}
    body.dark .project-country-label{color:#cbd5e1}
    body.dark .project-country-btn{background:#1f2937;color:#cbd5e1;border-color:#374151}
    body.dark .project-country-btn:hover{background:#172554;color:#bfdbfe;border-color:#2563eb}
    body.dark .project-country-btn.active{background:#2563eb;color:#fff;border-color:#60a5fa}
</style>

  function setLanguage(lang){
    const selected = lang === 'vi' ? 'vi' : 'en';

    if(state && state.meta) state.meta.uiLanguage = selected;
  }
  function translateStaticText(root=document.body){
    if(currentLang()!=='vi' || !root) return;
    const skip = new Set(['SCRIPT','STYLE','TEXTAREA','INPUT','SELECT','OPTION']);
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const parent = node.parentElement;
        if(!parent || skip.has(parent.tagName)) return NodeFilter.FILTER_REJECT;
        const raw = node.nodeValue || '';
        if(!raw.trim()) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes = [];
    while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(node=>{
      const raw = node.nodeValue || '';
      const trimmed = raw.trim();
      if(I18N.vi[trimmed]){
        node.nodeValue = raw.replace(trimmed, I18N.vi[trimmed]);
      }
    });
  }

  function applyMyanmarPipelineImport(s){
    s = s || sampleState();
    s.projects = Array.isArray(s.projects) ? s.projects : [];
    s.meta = s.meta || {};
    const existingIds = new Set(s.projects.map(p => p.id));
    const existingMyanmarNames = new Set(s.projects
      .filter(p => (p.country||'') === 'Myanmar')
      .map(p => String(p.name||'').trim().toLowerCase())
      .filter(Boolean));
    let added = 0;
    importedMyanmarPipeline.forEach(p => {
      const nameKey = String(p.name||'').trim().toLowerCase();
      if(!existingIds.has(p.id) && !existingMyanmarNames.has(nameKey)){
        s.projects.push(JSON.parse(JSON.stringify(p)));
        existingIds.add(p.id);
        existingMyanmarNames.add(nameKey);
        added++;
      }
    });
    if(added){
      s.meta.myanmarPipelineImportVersion = MYANMAR_PIPELINE_IMPORT_VERSION;
      s.meta.myanmarPipelineImportCount = (Number(s.meta.myanmarPipelineImportCount)||0) + added;
      s.meta.updated = new Date().toISOString();
    }
    return s;
  }

  function loadState(){
    const embedded = readEmbeddedState();
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : null;
      if(shouldUseEmbeddedState(embedded, parsed)){
        const mergedEmbedded = mergeDefaults(embedded);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedEmbedded));
        localStorage.setItem('ats_embedded_state_loaded_at', mergedEmbedded.meta?.htmlExportedAt || mergedEmbedded.meta?.updated || '');
        return mergedEmbedded;
      }
      if(parsed){
        return mergeDefaults(parsed);
      }
      if(embedded){
        const mergedEmbedded = mergeDefaults(embedded);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedEmbedded));
        localStorage.setItem('ats_embedded_state_loaded_at', mergedEmbedded.meta?.htmlExportedAt || mergedEmbedded.meta?.updated || '');
        return mergedEmbedded;
      }
      const fresh = sampleState();
      fresh.projects = fresh.projects.map(normalizeProject);
      fresh.tasks = fresh.tasks.map(normalizeTask);
      return fresh;
    }catch(e){
      console.warn(e);
      if(embedded) return mergeDefaults(embedded);
      return sampleState();
    }
  }

  function mergeDefaults(s){
    const d = sampleState();
    return {
      ...d,
      ...s,
      settings:{...d.settings,...(s.settings||{})},
      meta:{...d.meta,...(s.meta||{})},
      projects: (Array.isArray(s.projects)?s.projects:d.projects).map(normalizeProject),

      documents: Array.isArray(s.documents)?s.documents:d.documents,
      kpis: Array.isArray(s.kpis)?s.kpis:d.kpis,
    };
  }

  function normalizeProject(p){
    const confidence = p.confidenceLevel !== undefined && p.confidenceLevel !== '' ? p.confidenceLevel : (p.probability !== undefined ? p.probability : 0);
    const won = String(p.status||'').toLowerCase()==='won' || String(p.stage||'').toLowerCase().includes('award');
    return {
      confidenceLevel: Number(confidence || 0),
      probability: Number(confidence || 0),
      contractActive: p.contractActive !== undefined ? Boolean(p.contractActive) : won,
      projectTimeline: p.projectTimeline || '',
      ...p,
      confidenceLevel: Number(confidence || 0),
      probability: Number(confidence || 0),
      contractActive: p.contractActive !== undefined ? Boolean(p.contractActive) : won,
      projectTimeline: p.projectTimeline || '',
      timelineEntries: Array.isArray(p.timelineEntries) ? p.timelineEntries.map(normalizeTimelineEntry) : p.timelineEntries
    };
  }

  function normalizeTask(t){
    return {
      taskType: t.taskType || t.type || 'ATS',
      checklist: t.checklist || '',
      checklistDone: t.checklistDone || {},
      ...t
    };
  }

  function saveState(show=true){
    state.meta.updated = new Date().toISOString();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if(show) toast('Saved to browser local storage');
  }

  function $(sel){return document.querySelector(sel)}
  function $all(sel){return [...document.querySelectorAll(sel)]}
  function esc(v){
    if(v===null || v===undefined) return '';
    return String(v).replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }
  function num(v){return Number(v||0)}
  function countryCode(country){
    const map = {Vietnam:'VN', Myanmar:'MMR', Philippines:'PHP', Malaysia:'MAL', Indonesia:'INDO', Thailand:'THAI', PNG:'PNG'};
    return map[country] || country || '';
  }
  function pct(v){return `${Number(v||0).toFixed(0)}%`}
  function moneyUSD(v){
    const cur = $('#displayCurrency')?.value || 'USD';
    const fx = Number(localStorage.getItem('ats_sea_fx') || state.meta.usdToVnd || 25000);
    const val = Number(v||0);
    if(cur==='VND') return new Intl.NumberFormat('vi-VN',{maximumFractionDigits:0}).format(val*fx)+' VND';
    return '$'+new Intl.NumberFormat('en-US',{maximumFractionDigits:0}).format(val);
  }
  function countryFilter(){
    return $('#globalCountry')?.value || 'All';
  }
  function byCountry(list){
    const c = countryFilter();
    if(!c || c==='All') return list;
    return list.filter(x => (x.country||'')===c || (x.country||'')==='All');
  }
  function idLabel(id){
    const p = state.projects.find(x=>x.id===id);
    return p ? p.name : id;
  }
  function today(){return localISODate(new Date())}
  function isOverdue(date){
    return date && date < today();
  }
  function stageTag(stage){
    const s = String(stage||'');
    if(s.includes('Won') || s==='Awarded / Won') return 'green';
    if(s.includes('Lost') || s==='Cancelled') return 'red';
    if(s.includes('Submitted') || s.includes('Clarification') || s.includes('Negotiation')) return 'purple';
    if(s.includes('Tender') || s.includes('Proposal')) return 'orange';
    if(s.includes('Lead') || s.includes('Discussion')) return 'blue';
    return 'gray';
  }
  function priorityTag(p){
    if(p==='Urgent') return 'red';
    if(p==='High') return 'orange';
    if(p==='Medium') return 'blue';
    if(p==='Low') return 'green';
    return 'gray';
  }
  function statusTag(s){
    if(s==='Won' || s==='Done') return 'green';
    if(s==='Lost' || s==='Cancelled') return 'red';
    if(s==='Waiting' || s==='On Hold') return 'orange';
    if(s==='Submitted') return 'purple';
    return 'blue';
  }
  function winRate(){
    const won = state.projects.filter(p=>p.status==='Won' || p.stage==='Awarded / Won').length;
    const lost = state.projects.filter(p=>p.status==='Lost' || p.stage==='Lost').length;
    const total = won + lost;
    return total ? Math.round(won/total*100) : 0;
  }
  function activeProjects(){
    return byCountry(state.projects).filter(p=>!['Lost','Cancelled'].includes(p.status) && !['Lost','Cancelled'].includes(p.stage));
  }
  function confidenceValue(p){
    return Math.max(0, Math.min(100, num(p.confidenceLevel !== undefined ? p.confidenceLevel : p.probability)));
  }
  function weightedValue(list){
    return list.reduce((sum,p)=>sum + num(p.valueUSD)*confidenceValue(p)/100,0);
  }
  function totalValue(list){
    return list.reduce((sum,p)=>sum + num(p.valueUSD),0);
  }
  function projectValueTotal(list){
    return list.reduce((sum,p)=>sum + num(p.totalCapexUSD),0);
  }
  function wonProjects(list){
    return list.filter(p=>['Awarded / Won','Won'].includes(p.stage) || p.status==='Won');
  }
  function percentRatio(a,b){
    return b ? `${Math.round(num(a)/num(b)*100)}%` : '0%';
  }

  function init(){
    setLanguage(state.meta.uiLanguage || localStorage.getItem('ats_ui_language') || 'en');

  function ensureTimelineSettings(){
    const requiredActionTypes = ['Tender issued','Confirm received','Acknowledge','Email','Submission','Document submission','Quick discussion','Phone call','Face-to-face meeting','Reminder'];
    const requiredStages = ['Enquiry received','Qualification','Technical proposal','Commercial proposal','Negotiation','Contract signed','Execution','Completed'];
    state.settings.timelineActionTypes = Array.from(new Set([...(state.settings.timelineActionTypes||[]), ...requiredActionTypes]));

  function metric(label,value,sub,cls=''){

  function aggregate(list,key,valKey){
    const obj = {};
    list.forEach(x=>{
      const k = x[key] || 'Unspecified';
      obj[k] = (obj[k]||0)+num(x[valKey]);
    });
    return Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  }
  function countBy(list,key){
    const obj = {};
    list.forEach(x=>{
      const k = x[key] || 'Unspecified';
      obj[k] = (obj[k]||0)+1;
    });
    return Object.entries(obj).sort((a,b)=>b[1]-a[1]);
  }
  function barChart(rows,total){
    if(!rows.length) return `<div class="empty">No data yet.</div>`;
    const max = Math.max(...rows.map(r=>r[1]),1);
    return rows.map(([label,val])=>`
      <div class="bar-row">
        <div title="${esc(label)}">${esc(truncate(label,28))}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.max(3,val/max*100)}%"></div></div>
        <div style="text-align:right;font-weight:900">${moneyUSD(val)}</div>

  function filterCalendarCountry(list){

  function calendarHTML(month,tasks,acts){
    const [y,m] = month.split('-').map(Number);
    const first = new Date(y,m-1,1);
    const startDay = first.getDay();
    const daysInMonth = new Date(y,m,0).getDate();
    const prevDays = new Date(y,m-1,0).getDate();
    const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let cells = names.map(n=>`<div class="day-name">${n}</div>`).join('');
    const totalCells = Math.ceil((startDay+daysInMonth)/7)*7;
    for(let i=0;i<totalCells;i++){
      const dayNum = i-startDay+1;
      let d, muted=false;
      if(dayNum<1){ d = new Date(y,m-2,prevDays+dayNum); muted=true; }
      else if(dayNum>daysInMonth){ d = new Date(y,m-1,dayNum); muted=true; }
      else d = new Date(y,m-1,dayNum);
      const iso = localISODate(d);
      const dayTasks = tasks.filter(t=>t.dueDate===iso);
      const dayActs = acts.filter(a=>a.date===iso);
      cells += `<div class="day ${muted?'muted':'current-month'} ${iso===today()?'today':''} ${iso===selectedCalendarDate?'selected':''}" data-action="open-calendar-date" data-date="${iso}">
        <div class="date-num">${d.getDate()}</div>
        ${dayActs.map(a=>`<div class="cal-item" title="[${countryCode(a.country)}] ${esc(a.name)}">● [${countryCode(a.country)}] ${esc(a.name||a.type||'Event')}</div>`).join('')}
        ${dayTasks.map(t=>`<div class="cal-item from-task ${t.priority==='Urgent'?'urgent':''}" title="[${countryCode(t.country)}] ${esc(t.title)}">✓ [${countryCode(t.country)}] ${esc(t.title)}</div>`).join('')}
      </div>`;
    }
    const weeks = totalCells / 7;
    return `<div class="calendar-scroll"><div class="calendar-grid" style="grid-template-rows:24px repeat(${weeks}, minmax(0, 1fr));">${cells}</div></div>`;
  }

  function formatTimeRange(a){
    const st = a.startTime || '';

    return st || en || '';
  }

  function taskBoardHTML(tasks){

  function checklistItems(t){
    return String(t.checklist||'').split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
  }

  function taskTypeClass(v){
    v = String(v||'ATS').toLowerCase();
    if(v.includes('utility')) return 'utility';
    if(v.includes('c&i') || v.includes('c and i')) return 'ci';
    if(v.includes('smartdcg')) return 'smartdcg';
    return 'ats';
  }

  function shortDate(date){
    if(!date) return 'No date';
    const d = new Date(date+'T00:00:00');
    if(isNaN(d)) return String(date);
    return d.toLocaleString('en-US',{month:'short',day:'numeric'});
  }

  function daysUntil(date){
    if(!date) return 9999;
    const due = new Date(date+'T00:00:00');
    const now = new Date(today()+'T00:00:00');
    if(isNaN(due)) return 9999;
    return Math.ceil((due-now)/(24*60*60*1000));
  }

  function deadlineClass(date){
    const d = daysUntil(date);
    if(d <= 1) return 'red';
    if(d === 2) return 'yellow';
    if(d === 3) return 'green';
    return 'gray';
  }

  function annualScheduleHTML(tasks, acts){
    const year = Number((currentMonth||today().slice(0,7)).slice(0,4)) || new Date().getFullYear();
    const months = Array.from({length:12}, (_,i)=>({index:i, name:new Date(year,i,1).toLocaleString('en-US',{month:'short'}), items:[]}));
    tasks.forEach(t=>{
      if(!t.dueDate || Number(t.dueDate.slice(0,4))!==year) return;
      const idx = Number(t.dueDate.slice(5,7))-1;
      if(months[idx]) months[idx].items.push({kind:'task', date:t.dueDate, country:t.country, title:t.title, meta:t.taskType||'Task'});

  function attachListFilters(collection){
    filters[collection] = filters[collection] || {search:'',stage:'',priority:''};
    const searchEl = $(`#${collection}Search`);
    const stageEl = $(`#${collection}StageFilter`);
    const priorityEl = $(`#${collection}PriorityFilter`);
    if(searchEl) searchEl.addEventListener('input', e=>{ filters[collection].search = e.target.value; render(); });
    if(stageEl) stageEl.addEventListener('change', e=>{ filters[collection].stage = e.target.value; render(); });
    if(priorityEl) priorityEl.addEventListener('change', e=>{ filters[collection].priority = e.target.value; render(); });
  }

  function filterList(collection, list){
    filters[collection] = filters[collection] || {search:'',stage:'',priority:''};
    const f = filters[collection];
    const search = (f.search||'').toLowerCase();
    const stage = f.stage || '';
    const priority = f.priority || '';
    return list.filter(x=>{
      const text = JSON.stringify(x).toLowerCase();
      return (!search || text.includes(search)) &&
             (!stage || x.stage===stage) &&
             (!priority || x.priority===priority);
    });
  }

      <div class="timeline-box">
        ${entries.length ? `<div class="timeline-list">${rows}</div>` : `<div class="empty">No timeline step yet. Add the first step to track enquiry, proposal, negotiation, contract, execution and COD history.</div>`}
      </div>
    </div>`;
  }

  function timelineEntries(p){
    if(Array.isArray(p.timelineEntries)) return p.timelineEntries.map(normalizeTimelineEntry).filter(x=>x.stage || x.actionType || x.date || x.note);
    const legacy = String(p.projectTimeline || '').trim();
    if(!legacy) return [];
    return legacy.split(/\r?\n/).map(line=>legacyTimelineEntry(line)).filter(x=>x.stage || x.note);
  }

  function normalizeTimelineEntry(x){
    const entry = {
      stage: x?.stage || 'Enquiry received',
      actionType: x?.actionType || '',
      lane: x?.lane || '',
      date: x?.date || '',
      endDate: x?.endDate || '',
      startTime: x?.startTime || '',
      note: x?.note || ''
    };
    entry.lane = entry.lane || timelineLaneFromAction(entry.actionType);
    return entry;
  }

  function legacyTimelineEntry(line){
    const title = timelineTitle(line);
    const note = timelineNote(line);
    const stage = state.settings.timelineStages?.includes(title) ? title : 'Enquiry received';
    const actionType = stage===title ? '' : title;
    return {stage, actionType, lane:timelineLaneFromAction(actionType), date:'', endDate:'', startTime:'', note:note || line};
  }

  function timelineTitle(line){
    const parts = String(line||'').split(/\s[-–—:]\s|:\s/);
    return parts[0] || line;
  }

  function timelineNote(line){
    const s = String(line||'');
    const idx = s.search(/\s[-–—:]\s|:\s/);
    return idx>=0 ? s.slice(idx).replace(/^\s*[-–—:]\s*/, '') : '';
  }

  function timelineStageClass(stage){
    const s = String(stage||'').toLowerCase();
    if(s.includes('enquiry')) return 'enquiry';
    if(s.includes('qualification')) return 'qualification';
    if(s.includes('technical')) return 'technical';
    if(s.includes('commercial')) return 'commercial';
    if(s.includes('negotiation')) return 'negotiation';
    if(s.includes('contract')) return 'contract';
    if(s.includes('execution')) return 'execution';
    if(s.includes('completed')) return 'completed';
    return 'other';
  }

  function timelineLane(entry){
    return (entry?.lane === 'informal' || entry?.lane === 'formal') ? entry.lane : timelineLaneFromAction(entry?.actionType || '');
  }

  function timelineLaneFromAction(actionType){
    const s = String(actionType||'').toLowerCase();
    if(s.includes('quick') || s.includes('phone') || s.includes('face-to-face') || s.includes('face to face') || s.includes('reminder') || s.includes('informal')) return 'informal';
    return 'formal';
  }

  function timelineDisplayDate(date){
    if(!date) return '';
    const s = String(date);
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(m) return `${m[3]}/${m[2]}/${m[1]}`;
    return s;
  }

  function timelineDateText(entry){
    const date = entry?.date || '';
    const end = entry?.endDate || '';
    const time = entry?.startTime || '';
    const isExecution = String(entry?.stage||'').toLowerCase().includes('execution');
    const range = isExecution && end ? `${timelineDisplayDate(date) || 'Start date'} → ${timelineDisplayDate(end)}` : timelineDisplayDate(date);
    return [range, time].filter(Boolean).join(' • ');
  }

  function formatDMY(date){
    if(!date) return '-';
    const s = String(date);
    const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);

    return s;
  }

  function capacityNumber(v){
    const m = String(v||'').match(/[\d.]+/);
    return m ? Number(m[0]) : 0;
  }

  function completedCapacityBreakdown(list){
    return list.reduce((acc,p)=>{
      const c = capacityBreakdown(p);
      acc.pvMW += c.pvMW;
      acc.bessMW += c.bessMW;
      acc.bessMWh += c.bessMWh;
      return acc;
    }, {pvMW:0, bessMW:0, bessMWh:0});
  }

  function capacityBreakdown(p){
    const capacity = String(p.capacity || '');
    const context = `${p.projectType||''} ${p.segment||''} ${p.productScope||''} ${p.technologyScope||''}`.toLowerCase();
    const raw = capacity.replace(/,/g,' + ').replace(/;/g,' + ');
    const parts = raw.split(/\s*\+\s*/).map(x=>x.trim()).filter(Boolean);
    let pvMW = 0, bessMW = 0, bessMWh = 0;
    const addFromPart = (part)=>{
      const s = String(part||'');
      const low = s.toLowerCase();
      const hasBess = /\b(bess|ess|battery|storage)\b/.test(low) || /mwh\b/.test(low);
      const hasPV = /\b(pv|solar|rooftop|spp)\b/.test(low) || /mw(p|ac|dc)\b/i.test(s);
      const hasDG = /\b(dg|diesel|genset|generator)\b/.test(low);
      const mwMatches = [...s.matchAll(/(\d+(?:\.\d+)?)\s*MW(?:p|ac|dc)?\b(?!h)/gi)].map(m=>Number(m[1]));
      const mwhMatches = [...s.matchAll(/(\d+(?:\.\d+)?)\s*MWh\b/gi)].map(m=>Number(m[1]));
      if(hasBess){
        if(mwMatches.length) bessMW += mwMatches[0];
        mwhMatches.forEach(v=>bessMWh += v);
      }else if(hasPV && !hasDG){
        if(mwMatches.length) pvMW += mwMatches[0];
      }
    };
    parts.forEach(addFromPart);
    if(!parts.length && capacity){
      addFromPart(capacity);
    }
    if(pvMW===0 && bessMW===0 && bessMWh===0){
      const n = capacityNumber(capacity);
      if(n){
        if(/\b(bess|ess|battery|storage)\b/.test(context)) bessMW += n;
        else if(/\b(pv|solar|rooftop|spp)\b/.test(context)) pvMW += n;
      }
    }
    return {pvMW, bessMW, bessMWh};
  }

  function formatMW(v){
    return v ? `${Number(v).toFixed(v>=10?1:2)} MW` : '-';
  }

  function formatMWh(v){
    return v ? `${Number(v).toFixed(v>=10?1:2)} MWh` : '-';
  }

  function formatBESSCapacity(c){
    const mw = c && c.bessMW ? formatMW(c.bessMW) : '';
    const mwh = c && c.bessMWh ? formatMWh(c.bessMWh) : '';
    if(mw && mwh) return `${mw} / ${mwh}`;
    return mw || mwh || '-';
  }

  function completedPR(p){
    const raw = p.performanceRatio || p.pr || p.performance || '';
    const m = String(raw).match(/[\d.]+/);
    if(m) return Math.round(Number(m[0])*100)/100;
    const base = 92 + (Math.abs(hashCode(p.id||p.name||'')) % 420)/100;
    return Math.round(base*100)/100;
  }

  function unique(arr){ return [...new Set(arr.filter(x=>x!==undefined && x!==null && String(x).trim()!==''))]; }

  function hashCode(s){
    s = String(s||''); let h = 0;
    for(let i=0;i<s.length;i++) h = ((h<<5)-h) + s.charCodeAt(i) | 0;
    return h;
  }

  function generateReport(){
    const c = countryFilter();
    const projects = activeProjects();
    const tasks = byCountry(state.tasks);
    const customers = byCountry(state.customers);
    const partners = byCountry(state.partners);
    const activities = byCountry(state.activities);
    const hot = projects.filter(p=>['Urgent','High'].includes(p.priority)).sort((a,b)=>num(b.valueUSD)-num(a.valueUSD)).slice(0,5);
    const overdue = tasks.filter(t=>!t.completed && isOverdue(t.dueDate)).slice(0,5);
    const upcoming = projects.filter(p=>p.nextDue && p.nextDue>=today()).sort((a,b)=>String(a.nextDue).localeCompare(String(b.nextDue))).slice(0,5);
    return `ATS SEA Business Development Management Report
Region / Country Filter: ${c}
Prepared by: ${$('#reportOwner')?.value || 'Country Manager / SEA BD'}
Date: ${new Date().toLocaleDateString()}

1. Executive Summary
- Active opportunities/projects: ${projects.length}
- Total active pipeline value: ${moneyUSD(totalValue(projects))}
- Weighted pipeline value: ${moneyUSD(weightedValue(projects))}
- Current win rate: ${winRate()}%
- Active customers/accounts: ${customers.length}
- Active partners: ${partners.length}
- Marketing / BD activities recorded: ${activities.length}

2. Hot Opportunities
${hot.length ? hot.map((p,i)=>`${i+1}. ${p.name} | ${p.country} | ${p.stage} | ${moneyUSD(p.valueUSD)} | Probability ${p.probability || 0}% | Next: ${p.nextAction || '-'}`).join('\n') : '- No hot opportunity under current filter.'}

3. Upcoming Actions
${upcoming.length ? upcoming.map((p,i)=>`${i+1}. ${p.name} | Due ${p.nextDue} | Owner: ${p.nextOwner || '-'} | Action: ${p.nextAction || '-'}`).join('\n') : '- No upcoming project action under current filter.'}

4. Overdue / Risk Items
${overdue.length ? overdue.map((t,i)=>`${i+1}. ${t.title} | ${t.country} | Due ${t.dueDate} | Priority ${t.priority}`).join('\n') : '- No overdue task under current filter.'}

5. Country / Segment Notes
- Main focus: SCADA, PPC, EMS, MGC, SmartDCG, SmartDER for utility renewable, C&I microgrid and smaller DER cases.
- Probability is manually assessed per project, not automatically assigned by stage.
- Use ATS expected contract value as the main pipeline value. Total project CAPEX can be added optionally when available.

6. Recommended Next Steps
- Update all project next actions and due dates.
- Confirm missing technical inputs for tender/project records.
- Review partner performance and assign follow-up actions.
- Prepare proposal/tender checklist for records near submission deadline.
- Update CRM feedback after every customer/partner interaction.`;
  }

  function columnClass(c){
    if(c==='name') return 'col-name';

  function recordTable(collection, list, columns, projectClickable=false){
    if(!list.length) return `<div class="empty">No records yet. Click Add to create the first one.</div>`;
    const heads = columns.map(c=>{
      const colClass = collection==='projects' ? columnClass(c) : '';
      if(collection==='projects' && c==='name'){
        const sym = projectConfidenceSort==='desc' ? '↓' : (projectConfidenceSort==='asc' ? '↑' : '↕');
        const active = projectConfidenceSort ? ' active' : '';
        return `<th class="project-name-head ${colClass}"><div class="project-name-head-inner"><span>${esc(header(c))}</span><button class="sort-confidence${active}" data-action="sort-confidence" title="Sort by confidence level">${sym}</button></div></th>`;
      }
      return `<th class="${colClass}">${esc(header(c))}</th>`;
    }).join('') + `<th class="action-head">Actions</th>`;
    const rows = list.map(r=>{
      const tds = columns.map(c=>{
        let val = r[c];
        if(c==='valueUSD'||c==='totalValueUSD'||c==='revenueImpactUSD'||(collection==='kpis' && ['target','actual'].includes(c) && r.unit==='USD')) val = moneyUSD(val);
        if(c==='probability') val = pct(val);
        if(c==='stage') val = `<span class="tag ${stageTag(r[c])}">${esc(r[c]||'')}</span>`;
        if(c==='priority') val = `<span class="tag ${priorityTag(r[c])}">${esc(r[c]||'')}</span>`;
        if(c==='status') val = `<span class="tag ${statusTag(r[c])}">${esc(r[c]||'')}</span>`;
        if(c==='completed') val = `<input type="checkbox" data-action="task-complete" data-id="${esc(r.id)}" ${r.completed?'checked':''}/>`;
        if(c==='contractActive') val = r.contractActive ? `<span class="tag green">Yes</span>` : `<span class="tag gray">No</span>`;
        if(['nextDue','dueDate','nextContact','submissionDeadline'].includes(c) && isOverdue(r[c])) val = `<span class="tag red">${esc(r[c])}</span>`;
        if(projectClickable && c==='name') {
          const conf = confidenceValue(r);
          val = `<button class="project-name-fill" style="--confidence:${conf}%" data-action="open-project" data-id="${esc(r.id)}" title="Confidence ${pct(conf)}"><span>${esc(r.name)}</span></button>`;
        }
        const classes = [];
        if(projectClickable && c==='name') classes.push('project-name-cell');
        if(collection==='projects') classes.push(columnClass(c));
        const tdClass = classes.filter(Boolean).length ? ` class="${classes.filter(Boolean).join(' ')}"` : '';
        return `<td${tdClass}>${String(val||'').startsWith('<')?val:esc(val||'')}</td>`;
      }).join('');
      return `<tr>${tds}<td class="action-cell">
        <button class="btn-light small icon-action" data-action="edit-record" data-collection="${collection}" data-id="${esc(r.id)}" title="Edit">✎</button>
        <button class="btn-danger small icon-action" data-action="delete-record" data-collection="${collection}" data-id="${esc(r.id)}" title="Delete">×</button>
      </td></tr>`;
    }).join('');
    const tableClass = collection==='projects' ? 'project-pipeline-table' : '';
    return `<div class="table-wrap ${tableClass?`${tableClass}-wrap`:''}"><table class="${tableClass}"><thead><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  function fieldHTML(key,label,type,cls,val){
    cls = cls || '';
    const classes = `form-field ${cls}`;
    const safeVal = val===undefined || val===null ? '' : val;
    if(type==='textarea') return `<div class="${classes}"><label>${esc(t(label))}</label><textarea name="${esc(key)}">${esc(safeVal)}</textarea></div>`;
    if(type==='checkbox') return `<div class="${classes}"><label>${esc(t(label))}</label><label class="check-item"><input type="checkbox" name="${esc(key)}" ${safeVal?'checked':''}/> ${esc(t('Completed / Yes'))}</label></div>`;
    if(type && type.startsWith('multicheck:')){
      const listKey = type.split(':')[1];
      const selected = Array.isArray(safeVal) ? safeVal : String(safeVal||'').split(/[\n,;|]+/).map(x=>x.trim()).filter(Boolean);
      const opts = (state.settings[listKey]||[]).map(o=>`<label class="check-item"><input type="checkbox" name="${esc(key)}" value="${esc(o)}" ${selected.includes(o)?'checked':''}/> <span>${esc(o)}</span></label>`).join('');
      return `<div class="${classes}"><label>${esc(t(label))}</label><div class="multi-check-grid">${opts}</div></div>`;
    }
    if(type && type.startsWith('select:')){
      const listKey = type.split(':')[1];
      const opts = (state.settings[listKey]||[]).map(o=>`<option value="${esc(o)}" ${o===safeVal?'selected':''}>${esc(o)}</option>`).join('');
      return `<div class="${classes}"><label>${esc(t(label))}</label><select name="${esc(key)}"><option value="">-</option>${opts}</select></div>`;
    }
    if(type && type.startsWith('selectCustom:')){
      const opts = type.split(':')[1].split('|').map(o=>`<option value="${esc(o)}" ${o===safeVal?'selected':''}>${esc(o)}</option>`).join('');
      return `<div class="${classes}"><label>${esc(t(label))}</label><select name="${esc(key)}"><option value="">-</option>${opts}</select></div>`;
    }
    return `<div class="${classes}"><label>${esc(t(label))}</label><input name="${esc(key)}" type="${esc(type||'text')}" value="${esc(safeVal)}" /></div>`;
  }
  function formToRecord(schema, base){
    const data = {...base};
    schema.forEach(([key,label,type])=>{
      const el = $('#recordForm').elements[key];
      if(!el) return;
      if(type && type.startsWith('multicheck:')){
        data[key] = Array.from($('#recordForm').querySelectorAll(`input[name="${key}"]:checked`)).map(x=>x.value).join(', ');
      }
      else if(type==='checkbox') data[key] = el.checked;
      else if(type==='number') data[key] = el.value==='' ? '' : Number(el.value);
      else data[key] = el.value;
    });
    return data;
  }
  function newRecord(collection){
    const prefixes = {projects:'P-SEA',tasks:'T',customers:'C',partners:'PR',activities:'A',documents:'D',kpis:'K'};
    const p = prefixes[collection] || 'R';
    const id = `${p}-${String((state[collection]?.length||0)+1).padStart(3,'0')}`;
    const common = {id};
    if(collection==='projects') return {...common,country:state.settings.countries[0],projectType:'Utility',productScope:'SCADA',atsScope:'Software',stage:'Lead Identified',probability:0,confidenceLevel:0,status:'Active',contractActive:false,priority:'Medium',valueUSD:0,tenderChecklist:{},expectedDelivery:'',nextDue:'',submissionDeadline:'',timelineEntries:[]};
    if(collection==='tasks') return {...common,country:state.settings.countries[0],taskType:'ATS',priority:'Medium',status:'Not Started',dueDate:today(),completed:false,checklist:'',checklistDone:{}};
    if(collection==='customers') return {...common,country:state.settings.countries[0],relationship:'New',priority:'Medium',potential:'Medium',lastContact:today(),nextContact:''};
    if(collection==='partners') return {...common,country:state.settings.countries[0],relationship:'New',registeredOpportunities:0,proposalsSent:0,wonProjects:0,totalValueUSD:0,risk:'Medium'};
    if(collection==='activities') return {...common,country:state.settings.countries[0],type:'Online meeting',name:'New Event',date:today(),budgetUSD:0,revenueImpactUSD:0};
    if(collection==='documents') return {...common,country:'All',lastUpdate:today()};
    if(collection==='kpis') return {...common,year:new Date().getFullYear(),period:'Monthly',country:'All',target:0,actual:0,unit:'USD'};
    return common;
  }
  function collectionLabel(c){
    return t(({projects:'Project Pipeline',tasks:'Task',customers:'Customer',partners:'Partner',activities:'Activity',documents:'Document',kpis:'KPI'})[c]||c);
  }
  function closeModal(){
    $('#modal').classList.remove('show','completed-fullscreen-modal');
    $('#recordForm').onsubmit = null;
  }

  function handleClick(e){
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    const action = btn.dataset.action;
    if(action==='nav') setModule(btn.dataset.module);
    if(action==='toggle-project-section'){ projectGroupCollapsed = !projectGroupCollapsed; localStorage.setItem('ats_project_group_collapsed', projectGroupCollapsed ? '1' : '0'); renderNav(); }
    if(action==='goto') setModule(btn.dataset.module);
    if(action==='toggle-sidebar') $('#sidebar').classList.toggle('show');
    if(action==='collapse-sidebar'){
      document.querySelector('.app').classList.toggle('sidebar-collapsed');
      localStorage.setItem('ats_sea_sidebar_collapsed', document.querySelector('.app').classList.contains('sidebar-collapsed') ? '1' : '0');
      updateSidebarToggle();
    }
    if(action==='save') saveState();
    if(action==='close-modal') closeModal();
    if(action==='add-record') openForm(btn.dataset.collection);
    if(action==='add-completed-project') openCompletedProjectForm();
    if(action==='edit-completed-project') openCompletedProjectForm(btn.dataset.id);
    if(action==='completed-view'){ completedProjectView = btn.dataset.view || 'timeline'; localStorage.setItem('ats_completed_project_view', completedProjectView); render(); }
    if(action==='open-completed-fullscreen') openCompletedTimelineFullscreen();
    if(action==='add-event') openEventForm(btn.dataset.id, btn.dataset.date);
    if(action==='toggle-calendar-tasks'){ showTasksInCalendar = !showTasksInCalendar; localStorage.setItem('ats_sea_show_tasks_calendar', showTasksInCalendar ? '1' : '0'); render(); }
    if(action==='open-calendar-date') openCalendarDateModal(btn.dataset.date);
    if(action==='open-annual-month') openAnnualMonthModal(btn.dataset.year, btn.dataset.month);
    if(action==='edit-record') openForm(btn.dataset.collection, btn.dataset.id);
    if(action==='delete-record') deleteRecord(btn.dataset.collection, btn.dataset.id);
    if(action==='duplicate-record') duplicateRecord(btn.dataset.collection, btn.dataset.id);
    if(action==='open-project'){ state.selectedProjectId = btn.dataset.id; activeModule='projects'; renderNav(); render(); setTimeout(()=>document.getElementById('projectDetail')?.scrollIntoView({behavior:'smooth', block:'start'}), 80); }
    if(action==='detail-tab'){ detailTab = btn.dataset.tab; render(); }
    if(action==='add-timeline-step') openTimelineStepForm(btn.dataset.project);
    if(action==='edit-timeline-step') openTimelineStepForm(btn.dataset.project, btn.dataset.index);
    if(action==='delete-timeline-step') deleteTimelineStep(btn.dataset.project, btn.dataset.index);
    if(action==='export-json') exportJSON();
    if(action==='export-html') exportHTMLWithCurrentData();
    if(action==='export-csv') exportCSV(btn.dataset.collection);
    if(action==='save-settings') saveSettings();
    if(action==='reset-settings') { state.settings = JSON.parse(JSON.stringify(defaultSettings)); saveState(false); renderCountryOptions(); render(); toast('Settings reset'); }
    if(action==='load-sample') { if(confirm('Reload sample data? Current browser data will be replaced.')){ state = applyMyanmarPipelineImport(sampleState()); saveState(false); renderCountryOptions(); render(); toast('Sample data loaded with Myanmar pipeline'); } }
    if(action==='clear-data') { if(confirm('Clear all browser data for this platform?')){ localStorage.removeItem(STORAGE_KEY); state = applyMyanmarPipelineImport(sampleState()); saveState(false); renderCountryOptions(); render(); toast('Browser data cleared; sample data with Myanmar pipeline shown'); } }
    if(action==='copy-report') copyReport();
    if(action==='refresh-report') renderReports();
    if(action==='clear-filters') { filters[btn.dataset.collection] = {search:'',stage:'',priority:''}; render(); }
    if(action==='project-country-filter') {
      const country = btn.dataset.country || 'All';
      const global = $('#globalCountry');
      if(global) global.value = country;
      filters.projects = {search:'',stage:'',priority:''};
      render();
    }
    if(action==='sort-confidence') {
      projectConfidenceSort = projectConfidenceSort === '' ? 'desc' : (projectConfidenceSort === 'desc' ? 'asc' : '');
      localStorage.setItem('ats_project_confidence_sort', projectConfidenceSort);
      render();
    }
    if(action==='toggle-task-card'){
      const t = state.tasks.find(x=>x.id===btn.dataset.id);
      if(t){ t.completed = !t.completed; t.status = t.completed ? 'Done' : 'In Progress'; saveState(false); render(); toast('Task updated'); }
    }
  }

  function handleChange(e){
    const el = e.target;
    if(el.dataset.action==='task-complete'){
      const t = state.tasks.find(x=>x.id===el.dataset.id);
      if(t){ t.completed = el.checked; t.status = el.checked ? 'Done' : 'In Progress'; saveState(false); render(); toast('Task updated'); }
    }
    if(el.dataset.action==='check-tender'){
      const p = state.projects.find(x=>x.id===el.dataset.project);
      if(p){ p.tenderChecklist = p.tenderChecklist || {}; p.tenderChecklist[el.dataset.item] = el.checked; saveState(false); render(); toast('Checklist updated'); }
    }
    if(el.dataset.action==='task-check-item'){
      const t = state.tasks.find(x=>x.id===el.dataset.id);
      if(t){ t.checklistDone = t.checklistDone || {}; t.checklistDone[el.dataset.index] = el.checked; saveState(false); render(); toast('Checklist updated'); }
    }
  }

  function deleteRecord(collection,id){
    const item = state[collection].find(x=>x.id===id);
    if(!item) return;
    if(!confirm(`Delete ${collectionLabel(collection)}: ${item.name||item.title||item.company||item.id}?`)) return;
    state[collection] = state[collection].filter(x=>x.id!==id);
    if(collection==='projects' && state.selectedProjectId===id) state.selectedProjectId = state.projects[0]?.id || '';
    saveState(false);
    closeModal();
    render();
    toast('Deleted');
  }
  function duplicateRecord(collection,id){
    const item = state[collection].find(x=>x.id===id);
    if(!item) return;
    const copy = JSON.parse(JSON.stringify(item));
    copy.id = newRecord(collection).id;
    if(copy.name) copy.name += ' Copy';
    if(copy.title) copy.title += ' Copy';
    state[collection].unshift(copy);
    if(collection==='projects') state.selectedProjectId = copy.id;
    saveState(false); render(); toast('Duplicated');
  }

  function saveSettings(){
    $all('[data-setting]').forEach(t=>{
      state.settings[t.dataset.setting] = t.value.split('\n').map(x=>x.trim()).filter(Boolean);
    });
    const themeEl = $('#themeMode');
    if(themeEl) applyTheme(themeEl.value);
    const langEl = $('#languageMode');
    if(langEl) setLanguage(langEl.value);
    const fxEl = $('#settingsFxRate');
    if(fxEl){ state.meta.usdToVnd = Number(fxEl.value || 25000); localStorage.setItem('ats_sea_fx', String(state.meta.usdToVnd)); }
    saveState(false);
    renderCountryOptions();
    render();
    toast(t('Settings saved'));
  }

  function exportJSON(){
    saveState(false);
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    downloadBlob(blob, `ATS_SEA_BD_Backup_${today()}.json`);
  }

  function exportHTMLWithCurrentData(){
    const stamp = new Date().toISOString();
    state.meta = {...(state.meta||{}), updated: stamp, htmlExportedAt: stamp, embeddedDataVersion: 'v1.39'};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    const embeddedJSON = JSON.stringify(state, null, 2).replace(/</g, '\\u003c');
    const embeddedTag = `<script id="ats-embedded-state" type="application/json">\n${embeddedJSON}\n<\/script>`;
    let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

    html = html.replace(/<title>[^<]*<\/title>/, '<title>ATS Business Development Management Platform V1.39 - Embedded Data<\/title>');
    if(/<script id="ats-embedded-state" type="application\/json">[\s\S]*?<\/script>/.test(html)){
      html = html.replace(/<script id="ats-embedded-state" type="application\/json">[\s\S]*?<\/script>/, embeddedTag);
    }else{
      html = html.replace(/<script>\s*\(function\(\)\{/, `${embeddedTag}\n<script>\n(function(){`);
    }

    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    downloadBlob(blob, `ATS_SEA_Business_Development_Platform_UPDATED_${today()}.html`);
    toast('HTML file saved with current data');
  }

  function importJSON(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const obj = JSON.parse(reader.result);
        state = mergeDefaults(obj);
        saveState(false);
        renderCountryOptions();
        render();
        toast('JSON imported');
      }catch(err){
        alert('Invalid JSON file.');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  }
  function exportCSV(collection){
    const rows = state[collection] || [];
    if(!rows.length){toast('No data to export'); return;}
    const keys = Array.from(rows.reduce((set,r)=>{Object.keys(r).forEach(k=>{if(typeof r[k] !== 'object') set.add(k)}); return set;}, new Set()));
    const csv = [keys.join(',')].concat(rows.map(r=>keys.map(k=>csvCell(r[k])).join(','))).join('\n');
    downloadBlob(new Blob([csv],{type:'text/csv'}), `ATS_${collection}_${today()}.csv`);
  }
  function csvCell(v){
    const s = v===undefined || v===null ? '' : String(v);
    return `"${s.replace(/"/g,'""')}"`;
  }
  function downloadBlob(blob, filename){
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},0);
  }
  function copyReport(){
    navigator.clipboard.writeText($('#reportBox').textContent).then(()=>toast('Report copied'));
  }
  function toast(msg){
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast.timer);
    toast.timer = setTimeout(()=>t.classList.remove('show'),1900);
  }

  init();
})();
</script>
</body>
</html>
